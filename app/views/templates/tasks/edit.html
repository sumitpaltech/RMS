{% extends "layouts/base.html" %}
{% block title %}Edit Task — TaskApp{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
    <a href="{{ url_for('task.index') }}" class="btn btn-light btn-sm">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="mb-0 fw-bold">Edit Task</h4>
</div>

<div class="card border-0 shadow-sm" style="max-width: 680px;">
    <div class="card-body p-4">
        <form action="{{ url_for('task.update', id=task.id) }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                <input type="text" name="title" class="form-control" value="{{ task.title }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="description" class="form-control" rows="4">{{ task.description or '' }}</textarea>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Status</label>
                    <select name="status" class="form-select">
                        <option value="pending"     {% if task.status == 'pending'     %}selected{% endif %}>Pending</option>
                        <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                        <option value="completed"   {% if task.status == 'completed'   %}selected{% endif %}>Completed</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Priority</label>
                    <select name="priority" class="form-select">
                        <option value="low"    {% if task.priority == 'low'    %}selected{% endif %}>Low</option>
                        <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
                        <option value="high"   {% if task.priority == 'high'   %}selected{% endif %}>High</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Due Date</label>
                    <input type="date" name="due_date" class="form-control"
                           value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}">
                </div>
            </div>

            <div class="d-flex gap-2 pt-2">
                <button type="submit" class="btn btn-primary px-4 fw-semibold">
                    <i class="bi bi-check-lg me-1"></i>Update Task
                </button>
                <a href="{{ url_for('task.index') }}" class="btn btn-light px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
