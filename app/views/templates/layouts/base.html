<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="d-flex">
    {% if session.user_id %}
    <!-- Sidebar -->
    <div class="sidebar col-md-2 p-3 d-flex flex-column gap-1">
        <div class="text-white fw-bold fs-5 mb-4 px-2">
            <i class="bi bi-check2-square me-2"></i>TaskApp
        </div>
        <a href="{{ url_for('task.index') }}" class="py-2 px-3 d-block {% if request.endpoint == 'task.index' %}active{% endif %}">
            <i class="bi bi-list-task me-2"></i>My Tasks
        </a>
        <a href="{{ url_for('task.create') }}" class="py-2 px-3 d-block {% if request.endpoint == 'task.create' %}active{% endif %}">
            <i class="bi bi-plus-circle me-2"></i>New Task
        </a>
        <div class="mt-auto border-top border-secondary pt-3">
            <div class="text-secondary small px-2 mb-2">{{ session.user_name }}</div>
            <form action="{{ url_for('auth.logout') }}" method="GET">
                <button class="btn btn-sm btn-outline-danger w-100">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
    {% endif %}

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
